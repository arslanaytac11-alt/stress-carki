workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Stres Carki
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.strescarki.stressCarki
      flutter: stable
      xcode: 16.2
    scripts:
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.strescarki.stressCarki \
            --type IOS_APP_STORE \
            --create
      - name: Use profiles
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Generate localizations
        script: |
          flutter gen-l10n
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=1 \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
