name: stress_carki
description: "Stres Çarkı - Fidget Spinner Oyunu"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  vibration: ^2.0.0
  shared_preferences: ^2.3.0
  sensors_plus: ^7.0.0
  just_audio: ^0.9.42
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
