name: stress_carki
description: "Stres Çarkı - Fidget Spinner Oyunu"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  vibration: ^2.0.0
  shared_preferences: ^2.3.0
  sensors_plus: ^7.0.0
  just_audio: ^0.9.42
  path_provider: ^2.1.0
  google_mobile_ads: ^5.3.0
  firebase_core: ^3.9.0
  firebase_analytics: ^11.4.2
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon_1024x1024.png"
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
